<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gama Fitness - Register</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styling/output.css">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('app-theme') || 'default';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>
<body class="bg-app-bg text-zinc-300 antialiased min-h-screen flex items-center justify-center p-4">
  <div class="glass-panel rounded-[2rem] p-8 w-full max-w-md animate-fade-in-up">
    <div class="text-center mb-8">
      <h1 class="font-display text-4xl font-black text-white mb-2 tracking-tight">Register</h1>
      <p class="text-zinc-400">Join the Elite.</p>
    </div>

    <form hx-post="/api/register" hx-target="#error-message" class="space-y-6">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-2">Username</label>
        <input type="text" name="username" required class="w-full bg-zinc-900/50 border border-zinc-700 rounded-xl px-4 py-3 text-white outline-none focus:border-app-pink transition-colors">
      </div>
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-zinc-500 mb-2">Password</label>
        <input type="password" name="password" required class="w-full bg-zinc-900/50 border border-zinc-700 rounded-xl px-4 py-3 text-white outline-none focus:border-app-pink transition-colors">
      </div>
      <div id="error-message"></div>
      <button type="submit" class="w-full bg-app-pink text-white font-black uppercase tracking-widest py-4 rounded-xl hover:bg-pink-500 transition-all">
        Register
      </button>
    </form>

    <p class="text-center mt-8 text-zinc-500 text-sm">
      Already have an account? <a href="login.html" class="text-app-pink hover:text-white transition-colors">Login here</a>
    </p>
  </div>
</body>
</html>
