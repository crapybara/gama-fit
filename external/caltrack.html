<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gama Fitness - Nutrition</title>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
          colors: {
            app: { bg: '#0a0508', surface: '#140a10', card: '#1f0d16', pink: '#ff00a0', pinkDark: '#b30070', yellow: '#fbff00' }
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styling/caltrack.css">
<style>
  html, body { background: #0a0508 !important; }
  body { opacity: 0; transition: opacity .14s ease; }
  body.app-ready { opacity: 1; }
</style>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('app-ready');
  });
</script>
</head>

<body class="bg-app-bg text-zinc-300 antialiased min-h-screen flex flex-col md:flex-row selection:bg-app-pink selection:text-white relative">

  <nav class="fixed bottom-0 left-0 right-0 z-50 md:sticky md:top-0 md:w-24 md:h-screen bg-app-surface/90 backdrop-blur-md md:bg-app-surface border-t md:border-t-0 md:border-r border-zinc-800/50 flex flex-row md:flex-col items-center justify-center px-6 md:px-0 py-3 md:py-8 shrink-0">
    <div class="flex flex-row md:flex-col w-full md:w-auto justify-between md:justify-center items-center gap-1 md:gap-4">
      <a href="index.html" class="group relative flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
      <a href="workout.html" class="group relative flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg></a>
      <a href="caltrack.html" class="group relative flex items-center justify-center w-12 h-12 rounded-xl bg-app-yellow/10 text-app-yellow md:bg-app-yellow md:text-black transition-all hover:scale-105 shadow-[0_0_15px_rgba(251,255,0,0.3)]"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0-4.4-3.6-8-8-8S2 3.6 2 8c0 3.1 1.7 5.8 4.3 7.2l1.4 6.8c.2.8 1.3.8 1.5 0l1.4-6.8C13.3 13.8 18 11.1 18 8z"/><path d="M22 13.3V5c0-1.7-1.3-3-3-3v14.4c1.3-.4 2.4-1.3 2.8-2.5l.2-.6z"/></svg></a>
      <a href="sleep.html" class="group relative flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></a>
      <a href="analytics.html" class="group relative flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></a>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 pb-32 md:pb-8 overflow-y-auto overflow-x-hidden">
    <header class="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-8 lg:mb-12 page-animate-fade">
      <div>
        <p class="text-app-yellow font-semibold tracking-wider text-xs uppercase mb-2">Fuel The Machine</p>
        <h1 class="font-display text-4xl sm:text-5xl lg:text-6xl font-black text-white leading-tight tracking-tight">Nutrition</h1>
        <p class="text-zinc-400 mt-2 text-sm sm:text-base max-w-xl">Track your macros, hit your goals, get shredded.</p>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <div class="lg:col-span-12">
        <div id="daily-breakdown" class="glass-panel rounded-[2.5rem] p-8 lg:p-12 relative overflow-hidden page-animate-fade layout-delay" hx-get="/api/macros/summary" hx-trigger="load" hx-swap="innerHTML">
            <div class="text-zinc-500 text-sm text-center py-8 font-mono uppercase tracking-widest animate-pulse">Loading Macro Rings...</div>
        </div>
      </div>

      <div class="lg:col-span-6">
        <div class="glass-panel rounded-[2rem] p-6 lg:p-8 relative overflow-hidden page-animate-fade delay-200 h-full flex flex-col justify-center">
            <div class="absolute top-0 right-0 w-48 h-48 bg-app-yellow/10 blur-3xl rounded-full translate-x-1/3 -translate-y-1/3 pointer-events-none"></div>

            <div class="flex items-center justify-between mb-6 relative z-10 w-full">
                <h3 class="text-white font-black uppercase tracking-wider text-sm flex items-center gap-2">
                    <svg class="w-5 h-5 text-app-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                    My Food Catalogue
                </h3>
                <button onclick="document.getElementById('catalog-modal').classList.remove('hidden')" class="bg-zinc-900 border border-zinc-700 hover:border-app-yellow text-zinc-400 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-colors">Manage</button>
            </div>

            <div id="food-catalog-container" class="relative z-10 w-full" hx-get="/api/meals" hx-trigger="load" hx-swap="innerHTML">
                <div class="text-zinc-500 text-sm text-center py-4 font-mono animate-pulse">Loading catalogue...</div>
            </div>
        </div>
      </div>

      <div class="lg:col-span-6">
        <div class="glass-panel rounded-[2rem] p-6 lg:p-8 relative overflow-hidden page-animate-fade delay-200 h-full">
            <div class="absolute top-0 right-0 w-32 h-32 bg-app-pink/10 blur-3xl rounded-full pointer-events-none"></div>
            
            <h3 class="text-white font-black uppercase tracking-wider text-sm flex items-center gap-2 mb-6 relative z-10">
                <svg class="w-5 h-5 text-app-pink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Quick Track
            </h3>
            
            <form hx-post="/api/meals" hx-target="#food-catalog-container" hx-swap="none" hx-on::after-request="this.reset();" class="flex flex-col gap-3 relative z-10">
                <input type="text" name="quick_name" required placeholder="e.g. Eating Out / Unknown" class="w-full bg-zinc-900/80 border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-app-pink transition-all">
                <div class="flex gap-2">
                    <input type="number" name="quick_calories" required placeholder="Kcal" class="flex-1 bg-zinc-900/80 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-app-yellow font-mono">
                    <input type="number" name="quick_protein" placeholder="Pro (opt)" class="w-20 bg-zinc-900/80 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-app-pink font-mono hidden sm:block">
                    <input type="number" name="quick_carbs" placeholder="Carb (opt)" class="w-20 bg-zinc-900/80 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-blue-500 font-mono hidden sm:block">
                    <input type="number" name="quick_fats" placeholder="Fat (opt)" class="w-20 bg-zinc-900/80 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-emerald-500 font-mono hidden sm:block">
                </div>
                <button type="submit" class="mt-1 bg-app-pink text-white font-black py-3.5 rounded-xl hover:bg-pink-500 transition-all shadow-[0_0_15px_rgba(255,0,160,0.3)] uppercase tracking-wider text-xs">Fast Log</button>
            </form>
        </div>
      </div>

      <div class="lg:col-span-12 flex flex-col gap-6">
        <div class="glass-panel rounded-[2rem] p-6 lg:p-8 relative overflow-hidden page-animate-fade delay-300">
            <h3 class="text-zinc-400 font-bold uppercase tracking-wider text-xs mb-4">Create New Food Item (Adds to Catalogue)</h3>
            <form hx-post="/api/meals" hx-target="#food-catalog-container" hx-swap="innerHTML" hx-on::after-request="this.reset();" class="flex flex-col lg:flex-row gap-4 relative z-10">
                <div class="flex-1">
                    <input type="text" name="name" required placeholder="New Food Name (e.g. Greek Yogurt)" class="w-full bg-zinc-900/50 border border-zinc-700 rounded-xl px-4 py-3.5 text-sm text-white outline-none focus:border-app-yellow transition-all">
                </div>
                <div class="flex gap-2">
                    <input type="number" name="calories" required placeholder="Kcal" class="w-20 sm:w-24 bg-zinc-900/50 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-app-yellow font-mono">
                    <input type="number" name="protein" required placeholder="Pro" class="w-16 sm:w-20 bg-zinc-900/50 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-app-pink font-mono">
                    <input type="number" name="carbs" required placeholder="Carb" class="w-16 sm:w-20 bg-zinc-900/50 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-blue-500 font-mono">
                    <input type="number" name="fats" required placeholder="Fat" class="w-16 sm:w-20 bg-zinc-900/50 border border-zinc-700 rounded-xl px-2 py-3.5 text-sm text-center text-white outline-none focus:border-emerald-500 font-mono">
                </div>
                <button type="submit" class="bg-zinc-800 text-white hover:text-black font-bold px-6 py-3.5 rounded-xl hover:bg-yellow-400 transition-all uppercase tracking-wider text-xs whitespace-nowrap">Save & Log</button>
            </form>
        </div>
      </div>

      <div class="lg:col-span-12 flex flex-col gap-6">
        <div class="glass-panel rounded-[2rem] p-6 lg:p-8 relative overflow-hidden page-animate-fade delay-300">
            <h3 class="text-white font-black uppercase tracking-wider text-sm mb-6 flex items-center gap-2">
                <svg class="w-5 h-5 text-app-yellow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                Today's Log
            </h3>
            
            <div id="meals-list" class="flex flex-col gap-3 max-h-96 overflow-y-auto pr-2 scrollbar-hide"></div>
        </div>
      </div>

    </div> 
  </main>

  <div id="target-modal"></div>
  <div id="daily-breakdown-updater"></div>

  <div id="catalog-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm hidden transition-all">
    <div class="bg-[#140a10] border border-zinc-800 rounded-[2rem] p-6 sm:p-8 w-full max-w-md shadow-2xl mx-4">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-white font-black uppercase tracking-wider text-sm">Manage Catalogue</h3>
            <button onclick="document.getElementById('catalog-modal').classList.add('hidden')" class="text-zinc-500 hover:text-white">✕</button>
        </div>
        <div id="catalog-list" class="flex flex-col gap-2 max-h-64 overflow-y-auto pr-2 scrollbar-hide">
            <div class="text-zinc-500 text-sm text-center py-4 font-mono animate-pulse">Loading...</div>
        </div>
    </div>
  </div>

  <script src="scripts/caltrack.js"></script>
</body>
</html>
