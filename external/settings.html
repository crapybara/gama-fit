  <title>Gama Fitness - Settings</title>

  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="scripts/dashboard.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styling/output.css">
  

  <style>
    body { opacity: 0; transition: opacity .14s ease; }
    body.app-ready { opacity: 1; }
  </style>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('app-ready');
    });
  </script>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('app-theme') || 'default';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</head>

  <main class="flex-1 w-full max-w-4xl mx-auto p-4 sm:p-4 sm:p-6 lg:p-8 pb-24 md:pb-8 overflow-y-auto overflow-x-hidden relative z-10">

    <header class="mb-8 lg:mb-12 animate-fade-in-up">
      <p class="text-app-pink font-semibold tracking-wider text-xs uppercase mb-1 sm:mb-2">Configuration</p>
      <h1 class="font-display text-3xl sm:text-5xl lg:text-6xl font-black text-white leading-tight tracking-tight">Settings</h1>
      <p class="text-zinc-400 mt-1 sm:mt-2 text-xs sm:text-base max-w-xl">Customize your experience and body metrics.</p>
    </header>

    <div hx-get="/api/settings" hx-trigger="load" id="settings-container" class="w-full">
      <div class="text-center text-zinc-500 py-10 font-mono animate-pulse">Loading settings...</div>
    </div>

  </main>
