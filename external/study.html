<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gama Fitness - Study Mode</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styling/output.css">
  <link rel="stylesheet" href="styling/study.css">

  </head>

<body class="study-mode">
  <video id="study-bg-video" class="study-bg-video" autoplay muted loop playsinline></video>
  <div class="study-vignette"></div>
  <audio id="bg-audio"></audio>

  <header class="study-top-left">
    <a href="index.html" id="exit-study-orb" class="study-orb-btn study-exit-orb" title="Exit Study Mode" aria-label="Exit Study Mode">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    <button id="fullscreen-toggle" class="study-orb-btn" title="Toggle Fullscreen" aria-label="Toggle Fullscreen">
      <svg id="fullscreen-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      <svg id="exit-fullscreen-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>
    </button>
    <span id="study-username" class="study-username">Loading</span>
  </header>

  <main class="study-center" aria-live="polite">
    <div id="timer-display" class="timer-text">25:00</div>
    <button id="skip-break-btn" class="skip-break-btn hidden">Skip Break</button>
  </main>

  <div id="quote-display" class="quote-text">"Hone your focus, the results will follow."</div>

  <section class="study-bottom-left" aria-label="Study media controls">
    <button id="preset-open-btn" class="panel-btn" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 15 5-5 4 4 3-3 6 6"/></svg>
      Preset
    </button>

    <div class="music-console">
      <div class="music-row">
        <button id="music-shuffle-btn" class="music-btn" type="button" title="Shuffle playlist" aria-label="Shuffle playlist">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20L21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
        </button>
        <button id="music-prev-btn" class="music-btn" type="button" title="Previous track" aria-label="Previous track">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6z"/><path d="m9 12 9-6v12z"/></svg>
        </button>
        <button id="music-toggle-btn" class="music-btn main" type="button" title="Play music" aria-label="Play music">
          <span id="music-play-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
          <span id="music-pause-icon" class="hidden"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></span>
        </button>
        <button id="music-next-btn" class="music-btn" type="button" title="Next track" aria-label="Next track">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2z"/><path d="m15 12-9 6V6z"/></svg>
        </button>
        <button id="music-search-trigger" class="music-title-btn">No track loaded</button>
      </div>

      <div class="music-options">
        <input id="volume-slider" type="range" min="0" max="100" value="55" aria-label="Music volume">
      </div>
    </div>
  </section>

  <section class="study-bottom-right" aria-label="Timer controls">
    <button id="todo-toggle-btn" class="study-btn" type="button" title="To-do list" aria-label="To-do list">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>
    </button>
    <button id="play-pause-btn" class="study-btn primary" type="button" title="Play or pause timer" aria-label="Play or pause timer">
      <span id="play-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></span>
      <span id="pause-icon" class="hidden"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></span>
    </button>
    <button id="stop-btn" class="study-btn" type="button" title="Stop and reset timer" aria-label="Stop and reset timer">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
  </section>

  <aside id="todo-popup" class="todo-popup hidden">
    <div class="todo-header">
      <h2>Focus List</h2>
      <div class="session-btns">
        <button id="resume-session-btn" class="session-btn" title="Resume old session">Resume</button>
        <button id="take-break-btn" class="session-btn" title="Start short break">Break</button>
        <button id="take-long-break-btn" class="session-btn" title="Start long break">Long Break</button>
      </div>
      <button id="todo-close-btn" class="icon-close" type="button" aria-label="Close to-do list">x</button>
    </div>
    
    <div class="session-stats">
      <span><b id="count-rounds">0</b> round</span>
      <span><b id="count-breaks">0</b> break</span>
      <span><b id="count-long-breaks">0</b> long break</span>
    </div>

    <input id="todo-input" class="todo-input" type="text" placeholder="+ Add the task you will focus on">
    <ul id="todo-list" class="todo-list"></ul>
  </aside>

  <div id="preset-modal" class="study-modal hidden">
    <div class="study-modal-card">
      <div class="modal-header">
        <h2>Presets</h2>
        <button id="preset-close-btn" class="icon-close" type="button" aria-label="Close presets">x</button>
      </div>

      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="bg-tab">Background</button>
        <button class="tab-btn" data-tab="cdn-tab">CDN Video</button>
        <button class="tab-btn" data-tab="music-tab">Music</button>
        <button class="tab-btn" data-tab="font-tab">Font</button>
      </div>

      <div id="bg-tab" class="tab-content">
        <div id="video-grid" class="video-grid"></div>
      </div>

      <div id="cdn-tab" class="tab-content hidden">
        <div style="display: flex; flex-direction: column; gap: 1rem; padding: 1rem;">
          <label style="display: block; font-weight: 800; font-size: 0.85rem; color: rgba(255,255,255,0.6);">Video URL (Direct MP4/WebM)</label>
          <input id="cdn-video-input" class="todo-input" type="text" placeholder="https://example.com/video.mp4 or .webm" style="border-style: solid;">
          <button id="cdn-video-load-btn" class="panel-btn" style="justify-content: center; width: 100%;">Load Video</button>
        </div>
      </div>

      <div id="music-tab" class="tab-content hidden">
        <div style="display: flex; flex-direction: column; gap: 1rem; padding: 1rem;">
          <label style="display: block; font-weight: 800; font-size: 0.85rem; color: rgba(255,255,255,0.6);">Select Playlist</label>
          <select id="music-preset-select" style="width: 100%; border: 1px solid rgba(255,255,255,0.16); border-radius: 0.9rem; background: rgba(255,255,255,0.1); color: #fff; padding: 0.9rem; font-weight: 800; outline: none;"></select>
        </div>
      </div>

      <div id="font-tab" class="tab-content hidden">
        <div style="display: flex; flex-direction: column; gap: 1.5rem; padding: 1rem;">
          <label style="display: block; font-weight: 800; font-size: 0.85rem; color: rgba(255,255,255,0.6);">Timer Font</label>
          <div class="font-grid">
            <div class="font-card" data-font="Digital7" style="font-family: 'Digital7';">Digital 7</div>
            <div class="font-card" data-font="DSDigital" style="font-family: 'DSDigital';">DS Digital</div>
            <div class="font-card" data-font="LCD" style="font-family: 'LCD';">LCD</div>
            <div class="font-card" data-font="StalinOne" style="font-family: 'StalinOne';">Stalin One</div>
            <div class="font-card" data-font="Outfit" style="font-family: 'Outfit';">Outfit</div>
          </div>
          <div style="margin-top: 1rem;">
            <label style="display: block; font-weight: 800; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 0.5rem;">Timer Size</label>
            <input id="timer-size-slider" type="range" min="50" max="300" value="100" style="width: 100%; accent-color: #00e5ff;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="search-popup" class="search-popup hidden">
    <div class="search-popup-card">
      <div class="modal-header">
        <h2>Search Music</h2>
        <button id="search-close-btn" class="icon-close" type="button">x</button>
      </div>
      <input id="search-input" class="search-input" type="text" placeholder="Search track name...">
      <div id="search-results" class="search-results"></div>
    </div>
  </div>

  <script type="module" src="scripts/study/main.js"></script>
</body>
</html>
