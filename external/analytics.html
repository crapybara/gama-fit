<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gama Fitness - Analytics</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
          colors: {
            app: { bg: '#0a0508', surface: '#140a10', card: '#1f0d16', pink: '#ff00a0', yellow: '#fbff00', sleep: '#6366f1' }
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styling/analytics.css">

  <style>
    /* Smooth transition matrix for the SVG Area Graph */
    #analytics-shell { transition: opacity 0.3s ease-in-out; }
    .loading-state { opacity: 0.3; pointer-events: none; filter: grayscale(50%); }
    html, body { background: #0a0508 !important; }
  </style>
</head>

<body class="bg-[#0a0508] text-zinc-300 antialiased min-h-screen flex flex-col md:flex-row selection:bg-app-pink selection:text-white">

  <nav class="fixed bottom-0 left-0 right-0 z-50 md:sticky md:top-0 md:w-24 md:h-screen bg-app-surface/90 backdrop-blur-md md:bg-app-surface border-t md:border-t-0 md:border-r border-zinc-800/50 flex flex-row md:flex-col items-center justify-center px-6 md:px-0 py-3 md:py-8 shrink-0">
    <div class="flex flex-row md:flex-col w-full md:w-auto justify-between md:justify-center items-center gap-1 md:gap-4">
      <a href="index.html" class="flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
      <a href="workout.html" class="flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg></a>
      <a href="caltrack.html" class="flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8c0-4.4-3.6-8-8-8S2 3.6 2 8c0 3.1 1.7 5.8 4.3 7.2l1.4 6.8c.2.8 1.3.8 1.5 0l1.4-6.8C13.3 13.8 18 11.1 18 8z"/><path d="M22 13.3V5c0-1.7-1.3-3-3-3v14.4c1.3-.4 2.4-1.3 2.8-2.5l.2-.6z"/></svg></a>
      <a href="sleep.html" class="flex items-center justify-center w-12 h-12 rounded-xl text-zinc-500 hover:text-white hover:bg-zinc-800 transition-all hover:scale-105"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></a>
      <a href="analytics.html" class="flex items-center justify-center w-12 h-12 rounded-xl bg-app-yellow/10 text-app-yellow md:bg-app-yellow md:text-black transition-all hover:scale-105 shadow-[0_0_15px_rgba(251,255,0,0.18)]"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></a>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-7xl mx-auto p-4 md:p-6 lg:p-8 overflow-y-auto">
    <div id="analytics-shell" class="px-0 pt-2 pb-24 lg:pb-8 opacity-0">
      <div class="glass-panel rounded-[2rem] p-6 text-zinc-500 text-sm text-center animate-pulse">
        Crunching progression data...
      </div>
    </div>
  </main>

  <!-- DB Backup Actions -->
  <div class="fixed bottom-24 right-6 md:bottom-8 md:right-8 z-50 flex flex-col gap-3">
    <a href="/api/db/export" class="flex items-center gap-2 bg-zinc-900/80 backdrop-blur-md border border-white/5 hover:border-app-yellow/50 text-zinc-400 hover:text-app-yellow px-4 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest transition-all shadow-xl group">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Export DB</span>
    </a>
    
    <button onclick="document.getElementById('db-import-input').click()" class="flex items-center gap-2 bg-zinc-900/80 backdrop-blur-md border border-white/5 hover:border-app-pink/50 text-zinc-400 hover:text-app-pink px-4 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest transition-all shadow-xl group">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span>Import DB</span>
    </button>
    <form id="db-import-form" action="/api/db/import" method="POST" enctype="multipart/form-data" class="hidden">
      <input type="file" id="db-import-input" name="database" accept=".db" onchange="if(confirm('Importing will overwrite current data. Continue?')) document.getElementById('db-import-form').submit()">
    </form>
  </div>

  <script>
    const shell = document.getElementById('analytics-shell');
    const state = { timeframe: 'week', exercise: 'all' };

    async function loadAnalytics() {
      shell.classList.add('loading-state');
      const url = `/api/analytics/metrics?timeframe=${encodeURIComponent(state.timeframe)}&exercise=${encodeURIComponent(state.exercise)}`;
      try {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const html = await res.text();
        
        shell.innerHTML = html;
        shell.classList.remove('opacity-0', 'loading-state');
      } catch (err) {
        shell.innerHTML = `<div class="glass-panel p-6 text-white text-center">Failed to load graph data.</div>`;
        shell.classList.remove('opacity-0', 'loading-state');
      }
    }

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-timeframe]');
      if (btn) {
        e.preventDefault(); 
        state.timeframe = btn.getAttribute('data-timeframe');
        loadAnalytics();
      }
    });

    document.addEventListener('change', (e) => {
      if (e.target.id === 'exercise-select') {
        state.exercise = e.target.value;
        loadAnalytics();
      }
    });

    loadAnalytics();
  </script>
</body>
</html>
